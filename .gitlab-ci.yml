stages:
  - build
  - package

variables:
  IMAGE_NAME: web4_jakartaee
  FULL_IMAGE: ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${IMAGE_NAME}

build_java:
  image: eclipse-temurin:21-jdk-alpine
  stage: build
  tags:
    - kubernetes
  script:
    - ./gradlew assemble
  artifacts:
    paths:
      - build/wlp/usr/shared/resources/*.jar
      - build/libs/*.war

build_image:
  image: docker:29.1.5-cli
  services:
    - docker:29.1.5-dind
  stage: package
  needs:
    - build_java
  tags:
    - docker
  script:
    - docker build -t $FULL_IMAGE .
    - docker push $FULL_IMAGE

