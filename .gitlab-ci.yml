stages:
  - stage_build

variables:
  IMAGE_NAME: web4_jakartaee
  FULL_IMAGE: ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${IMAGE_NAME}

cache:
  paths:
    - .gradle/wrapper
    - .gradle/caches

build_job:
  image: docker:29.1.5-cli
  services:
    - docker:29.1.5-dind
  stage: stage_build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  tags:
    - shared
  before_script:
    - apk add --no-cache openjdk21
    - java -version      
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - ./gradlew libertyPackage
  script:
    - echo '--- Build Started ---'
    - docker build -t ${FULL_IMAGE}:latest .
    - docker push ${FULL_IMAGE}:latest
    - echo '--- Build Completed ---'
  after_script:
  - echo "--- Cleaning up ---"
  - ./gradlew clean
  - echo "--- Cleaned up ---"

